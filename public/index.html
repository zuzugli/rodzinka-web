<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <meta name="theme-color" content="#ffffff" />
    <title>Famille</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f0f0f0; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; }
      #root { width: 100%; max-width: 390px; min-height: 100vh; background: #fff; position: relative; }
      @media (min-width: 390px) { body { padding: 20px 0; } #root { border-radius: 40px; min-height: calc(100vh - 40px); overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.15); } }
    </style>
    <link rel="manifest" href="/manifest.json" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Famille" />
<link rel="apple-touch-icon" href="/icon-192.png" />
<meta name="theme-color" content="#F472B6" />
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
