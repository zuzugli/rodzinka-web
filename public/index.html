<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>Famille</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Caveat:wght@600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: 'Nunito', sans-serif; background: #E8E2D9; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; }
      #root { width: 100%; max-width: 390px; height: 100vh; background: #F5F0EA; position: relative; overflow: hidden; }
      @media (min-width: 430px) {
        body { padding: 24px 0; align-items: center; min-height: 100vh; }
        #root { border-radius: 44px; height: 844px; box-shadow: 0 30px 80px rgba(0,0,0,0.2); overflow: hidden; }
      }
      button { cursor: pointer; }
      input, button { font-family: 'Nunito', sans-serif; }
      ::-webkit-scrollbar { width: 0; height: 0; }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
