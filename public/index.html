<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#ffffff" />
    <title>Oiko</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { height: 100%; height: -webkit-fill-available; overflow: hidden; overscroll-behavior: none; }
      body { font-family: 'Plus Jakarta Sans', sans-serif; background: #fff; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; min-height: -webkit-fill-available; }
      #root { width: 100%; max-width: 430px; min-height: 100vh; min-height: -webkit-fill-available; background: #fff; position: relative; }
@media (min-width: 600px) { body { padding: 20px 0; background: #f0f0f0; } #root { max-width: 390px; border-radius: 40px; min-height: calc(100vh - 40px); overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.15); } }
      @media (orientation: landscape) and (max-height: 500px) { body::before { content: 'Veuillez tourner votre téléphone en mode portrait'; position: fixed; inset: 0; background: #fff; display: flex; align-items: center; justify-content: center; font-family: 'Plus Jakarta Sans', sans-serif; font-size: 16px; font-weight: 700; color: #1C1C1E; text-align: center; padding: 40px; z-index: 9999; } #root { display: none; } }
    </style>
    <link rel="manifest" href="/manifest.json" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Oiko" />
<link rel="apple-touch-icon" href="/icon-192.png" />
<meta name="theme-color" content="#F472B6" />
  </head>

    <div id="root"></div>
  </body>
